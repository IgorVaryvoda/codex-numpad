# Codex Deck — DMQ Design SPIN global bindings.
# F13-F24 are hardware-only signals emitted by firmware/codex/keymap.c.

# 12-key Codex layer.
bindd = , code:191, Codex Deck: focus Codex, exec, $HOME/.local/bin/kbd-codex focus
bindd = , code:192, Codex Deck: new task, exec, $HOME/.local/bin/kbd-codex new
bindd = , code:193, Codex Deck: search tasks, exec, $HOME/.local/bin/kbd-codex search
bindd = , code:194, Codex Deck: navigate back, exec, $HOME/.local/bin/kbd-codex back
bindd = , code:195, Codex Deck: Quick Chat, exec, $HOME/.local/bin/kbd-codex quick
bindd = , code:196, Codex Deck: navigate forward, exec, $HOME/.local/bin/kbd-codex forward
bindd = , code:197, Codex Deck: previous task, exec, $HOME/.local/bin/kbd-codex previous
bindd = , code:198, Codex Deck: find in task, exec, $HOME/.local/bin/kbd-codex find
bindd = , code:199, Codex Deck: next task, exec, $HOME/.local/bin/kbd-codex next
bindd = , code:200, Codex Deck: toggle dictation, exec, $HOME/.local/bin/kbd-dictate toggle
bindd = , code:201, Codex Deck: command menu, exec, $HOME/.local/bin/kbd-codex command
bindd = , code:202, Codex Deck: Enter or act, exec, $HOME/.local/bin/kbd-codex act

# Codex-layer encoder turns: desktop navigation without mouse-wheel cosplay.
bindd = CTRL, code:191, Codex Deck: previous Hyprland workspace, exec, $HOME/.local/bin/kbd-codex workspace-prev
bindd = CTRL, code:192, Codex Deck: next Hyprland workspace, exec, $HOME/.local/bin/kbd-codex workspace-next
bindd = CTRL, code:193, Codex Deck: previous window, exec, $HOME/.local/bin/kbd-codex window-prev
bindd = CTRL, code:194, Codex Deck: next window, exec, $HOME/.local/bin/kbd-codex window-next

# Media-layer middle encoder: scrub the active MPRIS player by ten seconds.
bindd = CTRL, code:195, Codex Deck: seek media backward, exec, $HOME/.local/bin/kbd-codex seek-back
bindd = CTRL, code:196, Codex Deck: seek media forward, exec, $HOME/.local/bin/kbd-codex seek-forward

# Codex prompt bank (tap the top knob again while in Codex mode): Shift+F13-F23.
# The macros type a prompt without sending it; the bank's bottom-right key
# emits plain F24, so the existing Enter/Act binding submits it. Shift+F24
# stays reserved for global dictation.
bindd = SHIFT, code:191, Codex Deck: plan prompt, exec, $HOME/.local/bin/kbd-codex plan
bindd = SHIFT, code:192, Codex Deck: go-on prompt, exec, $HOME/.local/bin/kbd-codex go-on
bindd = SHIFT, code:193, Codex Deck: finish prompt, exec, $HOME/.local/bin/kbd-codex finish
bindd = SHIFT, code:194, Codex Deck: fix prompt, exec, $HOME/.local/bin/kbd-codex fix
bindd = SHIFT, code:195, Codex Deck: test-fix prompt, exec, $HOME/.local/bin/kbd-codex test-fix
bindd = SHIFT, code:196, Codex Deck: review-fix prompt, exec, $HOME/.local/bin/kbd-codex review-fix
bindd = SHIFT, code:197, Codex Deck: status prompt, exec, $HOME/.local/bin/kbd-codex status
bindd = SHIFT, code:198, Codex Deck: explain prompt, exec, $HOME/.local/bin/kbd-codex explain
bindd = SHIFT, code:199, Codex Deck: docs prompt, exec, $HOME/.local/bin/kbd-codex docs
bindd = SHIFT, code:200, Codex Deck: commit prompt, exec, $HOME/.local/bin/kbd-codex commit
bindd = SHIFT, code:201, Codex Deck: ship prompt, exec, $HOME/.local/bin/kbd-codex ship

# 12-key Herdr layer. These call Herdr's socket API, not terminal prefix macros.
# The pane cross sits on the same physical keys as the Media-mode arrows.
bindd = ALT, code:191, Herdr Deck: focus Herdr, exec, $HOME/.local/bin/kbd-herdr focus
bindd = ALT, code:192, Herdr Deck: focus pane up, exec, $HOME/.local/bin/kbd-herdr pane-up
bindd = ALT, code:193, Herdr Deck: new tab, exec, $HOME/.local/bin/kbd-herdr new-tab
bindd = ALT, code:194, Herdr Deck: focus pane left, exec, $HOME/.local/bin/kbd-herdr pane-left
bindd = ALT, code:195, Herdr Deck: focus pane down, exec, $HOME/.local/bin/kbd-herdr pane-down
bindd = ALT, code:196, Herdr Deck: focus pane right, exec, $HOME/.local/bin/kbd-herdr pane-right
bindd = ALT, code:197, Herdr Deck: previous agent, exec, $HOME/.local/bin/kbd-herdr agent-prev
bindd = ALT, code:198, Herdr Deck: new workspace, exec, $HOME/.local/bin/kbd-herdr new-workspace
bindd = ALT, code:199, Herdr Deck: next agent, exec, $HOME/.local/bin/kbd-herdr agent-next
bindd = ALT, code:200, Herdr Deck: split pane right, exec, $HOME/.local/bin/kbd-herdr split-right
bindd = ALT, code:201, Herdr Deck: zoom pane, exec, $HOME/.local/bin/kbd-herdr zoom
bindd = ALT, code:202, Herdr Deck: split pane down, exec, $HOME/.local/bin/kbd-herdr split-down

# Herdr-layer encoders: workspace and tab wheels.
bindd = CTRL ALT, code:191, Herdr Deck: previous workspace, exec, $HOME/.local/bin/kbd-herdr workspace-prev
bindd = CTRL ALT, code:192, Herdr Deck: next workspace, exec, $HOME/.local/bin/kbd-herdr workspace-next
bindd = CTRL ALT, code:193, Herdr Deck: previous tab, exec, $HOME/.local/bin/kbd-herdr tab-prev
bindd = CTRL ALT, code:194, Herdr Deck: next tab, exec, $HOME/.local/bin/kbd-herdr tab-next

# Herdr prompt bank (tap the bottom knob again while in Herdr mode):
# Shift+Alt+F13-F24. Prompts are typed into the focused Herdr pane without
# submitting; the bottom-right key sends Enter.
bindd = SHIFT ALT, code:191, Herdr Deck: plan prompt, exec, $HOME/.local/bin/kbd-herdr prompt-plan
bindd = SHIFT ALT, code:192, Herdr Deck: go-on prompt, exec, $HOME/.local/bin/kbd-herdr prompt-go-on
bindd = SHIFT ALT, code:193, Herdr Deck: do-it prompt, exec, $HOME/.local/bin/kbd-herdr prompt-do-it
bindd = SHIFT ALT, code:194, Herdr Deck: fix-all prompt, exec, $HOME/.local/bin/kbd-herdr prompt-fix-all
bindd = SHIFT ALT, code:195, Herdr Deck: autoreview prompt, exec, $HOME/.local/bin/kbd-herdr prompt-autoreview
bindd = SHIFT ALT, code:196, Herdr Deck: adversarial-review prompt, exec, $HOME/.local/bin/kbd-herdr prompt-adversarial
bindd = SHIFT ALT, code:197, Herdr Deck: status prompt, exec, $HOME/.local/bin/kbd-herdr prompt-status
bindd = SHIFT ALT, code:198, Herdr Deck: resume prompt, exec, $HOME/.local/bin/kbd-herdr prompt-resume
bindd = SHIFT ALT, code:199, Herdr Deck: converge prompt, exec, $HOME/.local/bin/kbd-herdr prompt-converge
bindd = SHIFT ALT, code:200, Herdr Deck: commit-n-push prompt, exec, $HOME/.local/bin/kbd-herdr prompt-commit-push
bindd = SHIFT ALT, code:201, Herdr Deck: land-it prompt, exec, $HOME/.local/bin/kbd-herdr prompt-land
bindd = SHIFT ALT, code:202, Herdr Deck: send prompt, exec, $HOME/.local/bin/kbd-herdr send

# Hold the bottom knob in any mode: record while held, transcribe on release.
bindd = SHIFT, code:202, Codex Deck: start global dictation, exec, $HOME/.local/bin/kbd-dictate start
binddr = SHIFT, code:202, Codex Deck: stop global dictation, exec, $HOME/.local/bin/kbd-dictate stop
